<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RedCat CRM – Выбор роли</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .role-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
            text-align: center;
            padding: 2rem;
            cursor: pointer;
        }
        .role-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .role-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .btn-role {
            background-color: #1a1f36;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            display: inline-block;
        }
        .btn-role:hover {
            background-color: #2d325a;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold" style="color: #1a1f36;">RedCat CRM</h1>
            <p class="lead text-muted">Выберите вашу роль для входа в систему</p>
        </div>
        <div class="row justify-content-center g-4">
            <!-- Карточка Администратора -->
            <div class="col-md-4 col-sm-6">
                <div class="role-card">
                    <div class="role-icon">⚙️</div>
                    <h3 class="mb-3">Администратор</h3>
                    <p class="text-muted mb-4">Управление контрагентами, застройщиками и документами</p>
                    <a href="/admin/" class="btn-role">Войти</a>
                </div>
            </div>
            <!-- В будущем здесь появятся другие роли:
            <div class="col-md-4 col-sm-6">
                <div class="role-card">
                    <div class="role-icon">💼</div>
                    <h3 class="mb-3">Менеджер</h3>
                    <p class="text-muted mb-4">Работа с клиентами и сделками</p>
                    <a href="/manager/" class="btn-role">Войти</a>
                </div>
            </div>
            -->
        </div>
    </div>
</body>
</html>
