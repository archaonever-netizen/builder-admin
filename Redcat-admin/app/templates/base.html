<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RedCat AI Platform - {% block title %}Администратор{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='ui/css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='ui/css/foundations.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav id="navigation-rail" class="navigation-rail" aria-label="Основная навигация">
        <a href="/admin/" class="nav-item active">🏠 Dashboard</a>
        <a href="/admin/" class="nav-item">🏗️ Developers</a>
        <a href="/manager/" class="nav-item">💼 Agents</a>
        <a href="#" class="nav-item">🤖 AI Center</a>
        <a href="#" class="nav-item">📄 Documents</a>
        <a href="#" class="nav-item">⚙️ Settings</a>
    </nav>

    <div id="workspace">
        <header id="command-header" class="command-header">
            <!-- Командный поиск теперь на уровне страницы, поэтому здесь пусто -->
        </header>

        <main id="main-content" class="legacy-bootstrap">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='ui/js/navigation.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
