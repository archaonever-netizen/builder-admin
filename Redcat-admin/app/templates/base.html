<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RedCat AI Platform - {% block title %}Администратор{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='ui/css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='ui/css/foundations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav id="navigation-rail" aria-label="Основная навигация">
        <ul class="rail-list">
            <li class="rail-item"><a href="/admin/" class="rail-link">Dashboard</a></li>
            <li class="rail-item"><a href="/admin/" class="rail-link">Developers</a></li>
            <li class="rail-item"><a href="/manager/" class="rail-link">Agents</a></li>
            <li class="rail-item"><a href="#" class="rail-link">AI Center</a></li>
            <li class="rail-item"><a href="#" class="rail-link">Documents</a></li>
            <li class="rail-item"><a href="#" class="rail-link">Analytics</a></li>
            <li class="rail-item"><a href="#" class="rail-link">Settings</a></li>
        </ul>
    </nav>

    <div id="workspace">
        <header id="command-header">
            <div class="command-search">
                <span aria-hidden="true">🔎</span>
                <input type="search" placeholder="Найти застройщика, ЖК, договор…" aria-label="Поиск">
            </div>
            <div class="command-actions">
                <button type="button" class="icon-button" aria-label="Уведомления">🔔</button>
                <button type="button" class="icon-button" aria-label="Профиль">👤</button>
            </div>
        </header>

        <main id="main-content" class="legacy-bootstrap">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='ui/js/navigation.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
