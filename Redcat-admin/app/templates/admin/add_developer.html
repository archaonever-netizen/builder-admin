{% extends "base.html" %}
{% block title %}Новый застройщик{% endblock %}
{% block content %}
<div class="client-header">
  <h1>Новый застройщик</h1>
  <button type="button" class="btn btn-icon" onclick="history.back()" title="Назад">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m15 18-6-6 6-6"/></svg>
  </button>
</div>

<form id="developer-form" novalidate>
  <!-- Основная информация -->
  <section class="info-card">
    <h2 style="margin-bottom:24px; font-weight:600;">Основная информация</h2>
    <div class="mb-3">
      <label class="form-label" style="font-weight:500;">Название застройщика <span style="color: var(--text-secondary); cursor: help;" title="Официальное наименование компании-застройщика">?</span></label>
      <input type="text" class="input" name="name" id="field-name" required>
    </div>
    <div class="mb-3">
      <label class="form-label" style="font-weight:500;">Каналы MAX, Telegram <span style="color: var(--text-secondary); cursor: help;" title="Ссылки или описания каналов кураторов">?</span></label>
      <textarea class="input" name="channels" id="field-channels" rows="2" style="height: auto;"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label" style="font-weight:500;">Ссылка на шахматку <span style="color: var(--text-secondary); cursor: help;" title="URL интерактивной шахматки (план квартир)">?</span></label>
      <input type="url" class="input" name="chessboard_link" id="field-chessboard_link">
    </div>
    <div class="mb-3">
      <label class="form-label" style="font-weight:500;">Фид <span style="color: var(--text-secondary); cursor: help;" title="Описание или ссылка на фид объектов">?</span></label>
      <textarea class="input" name="feed" id="field-feed" rows="2" style="height: auto;"></textarea>
    </div>
  </section>

  <!-- Список ЖК -->
  <section class="section-block">
    <h2>Список ЖК <span style="color: var(--text-secondary); cursor: help; font-size: 14px;" title="Добавьте хотя бы один жилой комплекс с комиссией и куратором">?</span></h2>
    <div id="complexes-container" style="display: flex; flex-direction: column; gap: 12px;"></div>
    <button type="button" class="btn btn-success mt-3" id="add-complex">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="margin-right:6px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Добавить ЖК
    </button>
  </section>

  <!-- Контакты -->
  <section class="section-block">
    <h2>Контакты <span style="color: var(--text-secondary); cursor: help; font-size: 14px;" title="Различные роли: куратор, руководитель отдела продаж, партнёрского отдела, документооборот">?</span></h2>
    <div id="contacts-container" style="display: flex; flex-direction: column; gap: 12px;"></div>
    <button type="button" class="btn btn-success mt-3" id="add-contact">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="margin-right:6px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Добавить контакт
    </button>
  </section>

  <!-- Документы -->
  <section class="section-block">
    <h2>Документы <span style="color: var(--text-secondary); cursor: help; font-size: 14px;" title="Прикрепите агентский договор (или аналогичные документы)">?</span></h2>
    <div class="mb-3">
      <label class="form-label" style="font-weight:500;">Агентский договор (подписанный)</label>
      <input type="file" class="input" id="agency-file" accept=".pdf,.doc,.docx">
      <div id="agency-file-info" style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">Файл не выбран</div>
    </div>
    <div class="mb-3">
      <label class="form-label" style="font-weight:500;">Дополнительные документы</label>
      <input type="file" class="input" id="extra-files" multiple accept=".pdf,.doc,.docx,.txt">
      <div id="extra-files-info" style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">Файлы не выбраны</div>
    </div>
  </section>

  <!-- Нижняя панель -->
  <div style="display: flex; justify-content: space-between; align-items: center; padding: 24px 0; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: var(--bg);">
    <button type="button" class="btn btn-icon" onclick="history.back()" title="Назад">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <button type="button" class="btn btn-primary" id="submit-btn" style="padding: 0 32px; height: 52px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="margin-right:8px;"><polyline points="20 6 9 17 4 12"/></svg>
      Завершить
    </button>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/5.0.8-beta.17/jquery.inputmask.min.js"></script>

<script>
    const draftFields = ['name', 'channels', 'chessboard_link', 'feed'];
    let complexes = [];
    let contacts = [];
    let uploadedFiles = [];

    async function loadDraft() {
        const resp = await fetch('/admin/api/draft');
        const draft = await resp.json();
        if (draft && Object.keys(draft).length > 0) {
            document.getElementById('field-name').value = draft.name || '';
            document.getElementById('field-channels').value = draft.channels || '';
            document.getElementById('field-chessboard_link').value = draft.chessboard_link || '';
            document.getElementById('field-feed').value = draft.feed || '';
            if (draft.complexes) complexes = draft.complexes;
            if (draft.contacts) contacts = draft.contacts;
            if (draft.uploadedFiles) uploadedFiles = draft.uploadedFiles;
            renderComplexes();
            renderContacts();
        }
    }

    async function saveDraft() {
        const data = {
            name: document.getElementById('field-name').value,
            channels: document.getElementById('field-channels').value,
            chessboard_link: document.getElementById('field-chessboard_link').value,
            feed: document.getElementById('field-feed').value,
            complexes: complexes,
            contacts: contacts,
            uploadedFiles: uploadedFiles
        };
        await fetch('/admin/api/draft', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
    }

    function renderComplexes() {
        const container = document.getElementById('complexes-container');
        container.innerHTML = '';
        complexes.forEach((comp, index) => {
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.flexWrap = 'wrap';
            div.style.gap = '8px';
            div.style.alignItems = 'end';
            div.innerHTML = `
                <div style="flex: 2; min-width: 150px;">
                    <input type="text" class="input" placeholder="Название ЖК" value="${comp.name || ''}" onchange="updateComplex(${index}, 'name', this.value)">
                </div>
                <div style="flex: 1; min-width: 120px;">
                    <input type="text" class="input" placeholder="Город" value="${comp.city || ''}" onchange="updateComplex(${index}, 'city', this.value)">
                </div>
                <div style="flex: 1; min-width: 120px;">
                    <select class="input" onchange="updateComplex(${index}, 'region', this.value)">
                        <option value="">Регион</option>
                        <option value="Москва и МО" ${comp.region === 'Москва и МО' ? 'selected' : ''}>Москва и МО</option>
                        <option value="Санкт-Петербург и ЛО" ${comp.region === 'Санкт-Петербург и ЛО' ? 'selected' : ''}>Санкт-Петербург и ЛО</option>
                        <option value="Краснодарский край" ${comp.region === 'Краснодарский край' ? 'selected' : ''}>Краснодарский край</option>
                    </select>
                </div>
                <div style="flex: 1; min-width: 130px;">
                    <input type="text" class="input" placeholder="Тип недвижимости" value="${comp.property_type || ''}" onchange="updateComplex(${index}, 'property_type', this.value)">
                </div>
                <div style="flex: 1; min-width: 100px;">
                    <div style="display: flex; align-items: center; gap: 4px;">
                        <input type="text" class="input commission-input" placeholder="Комиссия" value="${comp.commission || ''}" onchange="updateComplex(${index}, 'commission', this.value)" style="flex: 1;">
                        <span style="white-space: nowrap;">%</span>
                    </div>
                </div>
                <div>
                    <button type="button" class="btn btn-icon" onclick="removeComplex(${index})" title="Удалить ЖК" style="height: 48px; width: 48px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>`;
            container.appendChild(div);
        });
        // Маска комиссии
        document.querySelectorAll('.commission-input').forEach(input => {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '');
            });
        });
    }

    window.updateComplex = function(index, key, value) {
        complexes[index][key] = value;
        saveDraft();
    };
    window.removeComplex = function(index) {
        complexes.splice(index, 1);
        renderComplexes();
        saveDraft();
    };

    document.getElementById('add-complex').addEventListener('click', () => {
        complexes.push({name: '', city: '', region: '', property_type: '', commission: '', contact_person: ''});
        renderComplexes();
        saveDraft();
    });

    function renderContacts() {
        const container = document.getElementById('contacts-container');
        container.innerHTML = '';
        contacts.forEach((cont, index) => {
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.flexWrap = 'wrap';
            div.style.gap = '8px';
            div.style.alignItems = 'end';
            div.innerHTML = `
                <div style="flex: 1; min-width: 130px;">
                    <select class="input" onchange="updateContact(${index}, 'type', this.value)">
                        <option ${cont.type === 'curator' ? 'selected' : ''} value="curator">Куратор</option>
                        <option ${cont.type === 'rop' ? 'selected' : ''} value="rop">РОП</option>
                        <option ${cont.type === 'partner_head' ? 'selected' : ''} value="partner_head">Рук. партнёрского отдела</option>
                        <option ${cont.type === 'doc_flow' ? 'selected' : ''} value="doc_flow">Документооборот</option>
                    </select>
                </div>
                <div style="flex: 2; min-width: 150px;">
                    <input type="text" class="input" placeholder="Имя" value="${cont.name || ''}" onchange="updateContact(${index}, 'name', this.value)">
                </div>
                <div style="flex: 1; min-width: 140px;">
                    <input type="tel" class="input phone-mask" placeholder="+7 (999) 999-99-99" value="${cont.phone || ''}" onchange="updateContact(${index}, 'phone', this.value)">
                </div>
                <div style="flex: 1; min-width: 160px;">
                    <input type="email" class="input" placeholder="Email" value="${cont.email || ''}" onchange="updateContact(${index}, 'email', this.value)">
                </div>
                <div>
                    <button type="button" class="btn btn-icon" onclick="removeContact(${index})" title="Удалить контакт" style="height: 48px; width: 48px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>`;
            container.appendChild(div);
        });
        // Применить маску телефона
        $(".phone-mask").inputmask("+7 (999) 999-99-99");
    }

    window.updateContact = function(index, key, value) {
        contacts[index][key] = value;
        saveDraft();
    };
    window.removeContact = function(index) {
        contacts.splice(index, 1);
        renderContacts();
        saveDraft();
    };

    document.getElementById('add-contact').addEventListener('click', () => {
        contacts.push({type: 'curator', name: '', phone: '', email: ''});
        renderContacts();
        saveDraft();
    });

    // Автосохранение при вводе в основных полях
    document.querySelectorAll('#field-name, #field-channels, #field-chessboard_link, #field-feed').forEach(el => {
        el.addEventListener('input', saveDraft);
    });

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        const resp = await fetch('/admin/api/upload', {method: 'POST', body: formData});
        const result = await resp.json();
        if (result.id) {
            uploadedFiles.push(result.id);
            saveDraft();
            return result;
        }
        return null;
    }

    document.getElementById('agency-file').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
            const info = document.getElementById('agency-file-info');
            info.textContent = 'Загрузка...';
            const uploaded = await uploadFile(file);
            if (uploaded) info.textContent = `Загружен: ${uploaded.filename}`;
            else info.textContent = 'Ошибка загрузки';
        }
    });

    document.getElementById('extra-files').addEventListener('change', async (e) => {
        const files = e.target.files;
        const info = document.getElementById('extra-files-info');
        info.textContent = 'Загрузка...';
        for (let file of files) {
            await uploadFile(file);
        }
        info.textContent = `Загружено файлов: ${uploadedFiles.length}`;
    });

    document.getElementById('submit-btn').addEventListener('click', async () => {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/admin/submit';
        form.style.display = 'none';
        const fields = {
            name: document.getElementById('field-name').value,
            channels: document.getElementById('field-channels').value,
            chessboard_link: document.getElementById('field-chessboard_link').value,
            feed: document.getElementById('field-feed').value,
            complexes: JSON.stringify(complexes),
            contacts: JSON.stringify(contacts)
        };
        for (let [key, value] of Object.entries(fields)) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = value;
            form.appendChild(input);
        }
        uploadedFiles.forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'doc_ids[]';
            input.value = id;
            form.appendChild(input);
        });
        document.body.appendChild(form);
        form.submit();
    });

    loadDraft();
</script>
{% endblock %}
